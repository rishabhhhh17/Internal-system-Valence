name: Weekly DB backup

on:
  schedule:
    # Every Sunday 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch: {}

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Install Supabase CLI
        run: |
          curl -sSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | tar -xz
          sudo mv supabase /usr/local/bin/

      - name: Dump database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          FILE="valance-$(date -u +%Y%m%d-%H%M%S).sql"
          supabase db dump --db-url "$SUPABASE_DB_URL" --data-only --file "$FILE"
          gzip "$FILE"
          echo "FILE=$FILE.gz" >> "$GITHUB_ENV"

      - name: Upload to off-site Supabase Storage
        env:
          URL: ${{ secrets.BACKUP_PROJECT_URL }}
          KEY: ${{ secrets.BACKUP_SERVICE_KEY }}
        run: |
          curl -sSf -X POST \
            "$URL/storage/v1/object/backups/$FILE" \
            -H "Authorization: Bearer $KEY" \
            -H "Content-Type: application/gzip" \
            --data-binary "@$FILE"
          echo "Uploaded $FILE to backups bucket"
